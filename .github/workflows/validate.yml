name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Validating JSON files..."
          failed=0
          for f in settings.json settings-cursor.json package.json themes/islands-dark.json; do
            if [ -f "$f" ]; then
              if python3 -c "import json; json.load(open('$f'))" 2>&1; then
                echo "  ✓ $f"
              else
                echo "  ✗ $f"
                failed=1
              fi
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more JSON files failed validation"
            exit 1
          fi

  validate-vsix:
    name: Validate VSIX packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Test VSIX packaging
        run: |
          vsce package --no-dependencies --skip-license 2>&1 || {
            echo "::warning::VSIX packaging failed (this may be due to a missing icon.png). The extension will still work when installed via scripts."
            exit 0
          }
          echo "✓ VSIX packaged successfully"
          ls -la *.vsix

  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          echo "Linting shell scripts..."
          failed=0
          for f in *.sh; do
            if [ -f "$f" ]; then
              if shellcheck --severity=error "$f" 2>&1; then
                echo "  ✓ $f"
              else
                echo "  ✗ $f"
                failed=1
              fi
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::ShellCheck found errors"
            exit 1
          fi

  lint-powershell:
    name: Lint PowerShell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Filter *.ps1 | ForEach-Object {
            $results = Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error
            if ($results) {
              Write-Host "  ✗ $($_.Name)"
              $results | Format-Table -AutoSize
              $failed = $true
            } else {
              Write-Host "  ✓ $($_.Name)"
            }
          }
          if ($failed) {
            Write-Error "PSScriptAnalyzer found errors"
            exit 1
          }
